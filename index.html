<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altrox Sistemas</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="topbar">
<div class="container nav">
<strong>Altrox Sistemas</strong>

<nav class="menu">
<a href="#downloads">Downloads</a>
<a href="#planos">Planos</a>
</nav>
</div>
</header>

<section id="planos" class="section">
<div class="container pricing-grid">

<div class="price-card">
<h3>Essencial</h3>
<div class="price">R$ 69,00 /mês</div>
<a class="btn btn-primary btn-plan" href="javascript:void(0)" onclick="iniciarCheckout('ID-ESSENCIAL')">Assinar agora</a>
</div>

<div class="price-card">
<h3>Profissional</h3>
<div class="price">R$ 179,00 /mês</div>
<a class="btn btn-primary btn-plan" href="javascript:void(0)" onclick="iniciarCheckout('ID-PROFISSIONAL')">Assinar agora</a>
</div>

<div class="price-card">
<h3>Enterprise</h3>
<div class="price">R$ 389,00 /mês</div>
<a class="btn btn-primary btn-plan" href="javascript:void(0)" onclick="iniciarCheckout('ID-ENTERPRISE')">Assinar agora</a>
</div>

</div>
</section>

<script>
async function iniciarCheckout(planId){
    const nome = prompt("Nome ou Razão Social:");
    const documento = prompt("CPF ou CNPJ:");
    const email = prompt("Email:");
    const telefone = prompt("Telefone:");

    const response = await fetch("https://api.altroxpdv.com.br/api/public/checkout/subscription-link", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            planId: planId,
            razaoSocial: nome,
            documento: documento,
            email: email,
            telefone: telefone,
            successUrl: window.location.href,
            pendingUrl: window.location.href,
            failureUrl: window.location.href
        })
    });

    const data = await response.json();

    if(data.checkoutUrl){
        window.location.href = data.checkoutUrl;
    } else {
        alert("Erro ao gerar pagamento");
    }
}
</script>

</body>
</html>
